<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>À propos - Pierre Le Page</title>
  <!-- Favicons -->
  <link rel="icon" type="image/png" href="LOGO NOIR SUR BLANC.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="Favicon blanc.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="Favicon blanc.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Josefin Sans', sans-serif;
      background: #ffffff;
      color: #0a0a0a;
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    
    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      color: #c0a86a;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: opacity 0.3s;
    }
    
    .back-link:hover {
      opacity: 0.7;
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 24px;
    }
    
    /* Portrait layout */
    .portrait-section {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
      margin: 40px 0 30px;
    }
    
    .portrait-image {
      flex: 0 0 180px;
    }
    
    .portrait-image img {
      width: 100%;
      height: auto;
      border-radius: 50%;
      object-fit: cover;
      aspect-ratio: 1 / 1;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      border: 2px solid #f0ede6;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .portrait-image img:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 30px rgba(0,0,0,0.12);
    }
    
    .bio-text {
      flex: 1;
    }
    
    p {
      font-weight: 300;
      font-size: 1rem;
      color: #444;
      margin-bottom: 20px;
    }
    
    .signature-note {
      margin: 30px 0 35px;
      font-style: italic;
      border-left: 3px solid #c0a86a;
      padding-left: 20px;
      color: #5a5a5a;
      font-size: 0.95rem;
    }
    
    /* Panorama section — aucune animation, taille réduite de moitié */
    .panorama-section {
      margin: 30px 0 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #faf9f5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      width: 50%;
      margin-left: auto;
      margin-right: auto;
    }
    
    /* Conteneur de l'image avec assombrissement léger */
    .panorama-image {
      position: relative;
      display: block;
      line-height: 0;
    }
    
    .panorama-image img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      aspect-ratio: 16 / 6;
      transition: none;
      filter: brightness(0.88);
    }
    
    /* Léger dégradé de fondu en bas */
    .panorama-image::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(to top, rgba(0,0,0,0.12), transparent);
      pointer-events: none;
      border-radius: 0 0 12px 12px;
    }
    
    /* Suppression complète de la légende */
    .panorama-caption {
      display: none;
    }
    
    @media (max-width: 560px) {
      .portrait-section {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 24px;
      }
      
      .bio-text {
        text-align: left;
      }
      
      .signature-note {
        text-align: left;
      }
      
      .container {
        padding: 40px 20px;
      }
      
      .panorama-image img {
        aspect-ratio: 16 / 5;
      }
      
      .panorama-section {
        width: 70%;
      }
    }
    
    @media (max-width: 480px) {
      .panorama-section {
        width: 85%;
      }
    }
    
    hr {
      margin: 32px 0 20px;
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, #e0dbcf, #c0a86a, #e0dbcf);
    }
    
    .small-credit {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 28px;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Retour à l'accueil</a>
    <h1>À propos</h1>
    
    <div class="portrait-section">
      <div class="portrait-image">
        <!-- Portrait - Correction : un seul attribut src -->
        <img src="portrait dos centré large.jpg" 
             alt="Portrait de Pierre Le Page, photographe naturaliste">
      </div>
      <div class="bio-text">
        <p>-</p>
        <p>-</p>
      </div>
    </div>
    
    <hr />
    
    <p>-</p>
    
    <div class="signature-note">
      « Le souvenir permis de l'éphémère  » <br />— Pierre Le Page
    </div>
    
    <!-- Panorama - Correction : un seul attribut src -->
    <div class="panorama-section">
      <div class="panorama-image">
        <img src="portait dos centré.jpg" 
             alt="Vaste paysage naturel - Brume matinale et vallée silencieuse"
             loading="lazy">
      </div>
    </div>
    
    <div class="small-credit">
      Portrait naturaliste &nbsp;•&nbsp; Regard sur les grands espaces
    </div>
  </div>
</body>
</html>
