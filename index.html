<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="description" content="Photographie naturaliste et romantique - Portfolio de Pierre Le Page" />
  <meta name="author" content="Pierre Le Page" />
  <title>Pierre Le Page — Photographie</title>
  
  <!-- Favicons -->
  <link rel="icon" type="image/png" href="LOGO NOIR SUR BLANC.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="Favicon blanc.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="Favicon blanc.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Josefin+Sans:wght@100;200;300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ========== RESET & VARIABLES ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gold: #c0a86a;
      --gray-bg: #f5f5f5;
      --text-light: #666;
    }
    
    html {
      overflow-x: hidden;
    }
    
    body {
      font-family: 'Josefin Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    body.no-scroll {
      overflow: hidden;
      height: 100%;
      position: fixed;
      width: 100%;
    }

    /* ========== TYPOGRAPHIE ========== */
    h1, h2, h3 {
      font-weight: 400;
    }
    
    /* ========== ANIMATIONS ========== */
    @keyframes breatheZoom {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    
    @keyframes bounceDown {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========== CURSEUR PERSONNALISÉ ========== */
    .cursor, .cursor-ring { display: none; }
    
    @media (min-width: 1024px) {
      .cursor {
        position: fixed;
        width: 6px;
        height: 6px;
        background: var(--white);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s;
      }
      
      .cursor-ring {
        position: fixed;
        width: 32px;
        height: 32px;
        border: 1.5px solid var(--white);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s, opacity 0.2s;
        opacity: 0.7;
      }
    }

    /* ========== HERO ========== */
    .hero {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }
    
    /* Masquer le curseur classique sur le hero */
    .hero,
    .hero * {
      cursor: none !important;
    }
    
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('red forest.jpg?w=1800&q=85');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.55) saturate(0.9);
      animation: breatheZoom 26s ease-in-out infinite;
      transform-origin: center center;
    }
    
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.25) 100%);
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      transform: translateY(80px);
    }
    
    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 12vw, 8rem);
      color: var(--white);
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 2px 30px rgba(0,0,0,0.3);
    }
    
    .hero-sub {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.85);
      margin-top: 12px;
      text-transform: uppercase;
    }
    
    .hero-logo {
      margin-top: 180px;
      width: 64px;
      height: 64px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s;
    }
    
    .hero-logo:hover {
      opacity: 0.8;
      transform: scale(1.05);
    }
    
    .hero-logo img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }
    
    .hero-chevron {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      animation: bounceDown 3s infinite;
    }
    
    .hero-chevron svg {
      width: 32px;
      height: 32px;
      stroke: rgba(255,255,255,0.7);
      fill: none;
      stroke-width: 1.5;
    }

    /* ========== GALERIE ========== */
    .gallery-section {
      position: relative;
      z-index: 2;
      background: var(--white);
      padding: 60px 0;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 100%;
      margin: 0 auto;
    }
    
    .photo-card {
      position: relative;
      overflow: hidden;
      background: #e8e8e8;
      cursor: pointer;
      aspect-ratio: 3 / 2;
    }
    
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    
    .photo-card:hover img {
      transform: scale(1.05);
    }
    
    .photo-card.span-2x2 {
      grid-column: span 2;
      grid-row: span 2;
      aspect-ratio: 3 / 2;
    }
    
    .photo-card.span-2x2:hover img {
      transform: scale(1.03);
    }
    
    .expand-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: 48px;
      height: 48px;
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
    }
    
    .expand-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
      stroke-width: 1.8;
    }
    
    .photo-card:hover .expand-btn {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .photo-card.span-2x2 {
        grid-column: span 2;
        grid-row: span 1;
      }
      .expand-btn {
        width: 40px;
        height: 40px;
      }
    }
    
    @media (max-width: 480px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
      .photo-card.span-2x2 {
        grid-column: span 1;
      }
    }

    /* ========== CONTACT ========== */
    .contact-section {
      position: relative;
      z-index: 2;
      background: var(--white);
      padding: 60px 8vw 80px;
    }
    
    .contact-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      margin-bottom: 80px;
    }
    
    .contact-info h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      margin-bottom: 24px;
    }
    
    .contact-email {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--black);
      border-bottom: 1px solid rgba(0,0,0,0.15);
      padding-bottom: 6px;
      cursor: pointer;
      transition: opacity 0.3s;
      display: inline-block;
      text-decoration: none;
    }
    
    .contact-email:hover {
      opacity: 0.6;
    }
    
    .contact-message {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: flex-end;
    }
    
    .contact-box {
      border: 1px solid rgba(0,0,0,0.12);
      padding: 36px 40px;
      max-width: 420px;
      width: 100%;
      transition: border-color 0.3s;
    }
    
    .contact-box:hover {
      border-color: rgba(0,0,0,0.3);
    }
    
    .contact-box p {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      line-height: 1.8;
      color: #555;
      text-transform: uppercase;
      text-align: center;
    }
    
    .contact-cta {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #999;
      text-align: right;
      max-width: 420px;
    }
    
    .contact-photo {
      width: 100%;
      aspect-ratio: 16 / 4.5;
      overflow: hidden;
      margin-top: 40px;
      cursor: none !important;
    }
    
    /* Masquer le curseur classique sur la photo contact */
    .contact-photo,
    .contact-photo * {
      cursor: none !important;
    }
    
    .contact-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.7) brightness(0.98);
      transition: opacity 0.5s;
    }
    
    @media (max-width: 768px) {
      .contact-section { padding: 40px 6vw 60px; }
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 48px;
        margin-bottom: 48px;
      }
      .contact-info { text-align: center; }
      .contact-message { align-items: center; }
      .contact-box { max-width: 100%; padding: 28px 24px; }
      .contact-cta { text-align: center; }
      .contact-photo { aspect-ratio: 16/6; margin-top: 20px; }
    }

    /* ========== SIGNATURE ========== */
    .signature-section {
      background: var(--white);
      padding: 40px 20px 20px;
      text-align: center;
      z-index: 2;
      position: relative;
    }
    
    .signature-img {
      height: 90px;
      width: auto;
      opacity: 0.9;
      transition: opacity 0.3s;
    }
    
    .signature-link:hover .signature-img {
      opacity: 0.7;
    }

    /* ========== FOOTER ========== */
    footer {
      background: var(--white);
      padding: 20px 24px 40px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    
    .footer-copy {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #aaa;
    }

    /* ========== LIGHTBOX ========== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
      background: rgba(0,0,0,0);
    }
    
    .lightbox.active {
      opacity: 1;
      visibility: visible;
      background: rgba(0,0,0,0.96);
    }
    
    .lb-scroll-container {
      position: absolute;
      inset: 0;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .lb-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 100%;
      min-height: 100%;
      padding: 2rem;
    }
    
    #lbImg {
      max-width: 90vw;
      max-height: 85vh;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: transform 0.15s ease-out;
    }
    
    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(30,30,30,0.8);
      backdrop-filter: blur(12px);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1002;
      transition: all 0.2s;
      opacity: 0;
      visibility: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .lb-nav.visible {
      opacity: 1;
      visibility: visible;
    }
    
    .lb-nav:hover {
      transform: translateY(-50%) scale(1.1);
      background: rgba(0,0,0,0.9);
      border-color: var(--gold);
    }
    
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }
    
    .lb-close {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(30,30,30,0.8);
      backdrop-filter: blur(12px);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1002;
      font-size: 28px;
      color: white;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .lb-close:hover {
      transform: scale(1.08);
      background: rgba(0,0,0,0.9);
      border-color: var(--gold);
      color: var(--gold);
    }
    
    .lb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      font-family: 'Josefin Sans', sans-serif;
      z-index: 1002;
    }
    
    @media (max-width: 768px) {
      .lb-nav { width: 44px; height: 44px; }
      .lb-prev { left: 12px; }
      .lb-next { right: 12px; }
    }
    
    @media (max-width: 460px) {
      .lb-nav { display: none; }
    }

    /* ========== BACK TO TOP ========== */
    .back-to-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 100;
      padding: 12px 8px;
    }
    
    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }
    
    .back-to-top svg {
      width: 28px;
      height: 44px;
      stroke: var(--gold);
      stroke-width: 1.3;
      fill: none;
      transition: transform 0.2s;
    }
    
    .back-to-top:hover svg {
      transform: translateY(-3px);
    }
    
    @media (max-width: 768px) {
      .back-to-top { bottom: 16px; right: 16px; }
      .back-to-top svg { width: 24px; height: 38px; }
    }
    
    /* Email feedback */
    .email-feedback {
      position: absolute;
      white-space: nowrap;
      background: #1a1a1a;
      color: white;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-family: 'Josefin Sans', sans-serif;
      pointer-events: none;
      z-index: 10000;
      border-radius: 4px;
      transition: opacity 0.3s;
    }
    
    .email-feedback.fade-out {
      opacity: 0;
    }
  </style>
</head>

      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

      const lbPrev = document.getElementById('lbPrev');
      const lbNext = document.getElementById('lbNext');
      const lbClose = document.getElementById('lbClose');

      let currentIndex = 0;
      let currentScale = 1;
      let isZoomed = false;
      let posX = 0, posY = 0;
      let savedScroll = 0;
      
      function resetZoom() {
        currentScale = 1;
        isZoomed = false;
        posX = posY = 0;
        lbImg.style.transform = 'scale(1)';
        if (scrollContainer) { scrollContainer.scrollTop = 0; scrollContainer.scrollLeft = 0; }
      }
      
      function updateImage() {
        const img = cards[currentIndex].querySelector('img');
        lbImg.src = img.src;
        lbCounter.textContent = `${currentIndex + 1} / ${cards.length}`;
        resetZoom();
      }
      
      function openLightbox(index) {
        savedScroll = window.scrollY;
        currentIndex = index;
        updateImage();
        lightbox.classList.add('active');
        document.body.classList.add('no-scroll');
      }
      
      function closeLightbox() {
        resetZoom();
        lightbox.classList.remove('active');
        document.body.classList.remove('no-scroll');
        setTimeout(() => window.scrollTo(0, savedScroll), 50);
      }
      
      function nextImage() { currentIndex = (currentIndex + 1) % cards.length; updateImage(); }
      function prevImage() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; updateImage(); }
      
      cards.forEach((card, i) => card.addEventListener('click', () => openLightbox(i)));
      lbClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox || e.target === scrollContainer) closeLightbox(); });
      lbPrev.addEventListener('click', (e) => { e.stopPropagation(); if (!isZoomed) prevImage(); });
      lbNext.addEventListener('click', (e) => { e.stopPropagation(); if (!isZoomed) nextImage(); });
      
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') { closeLightbox(); e.preventDefault(); }
        if (!isZoomed && e.key === 'ArrowLeft') { prevImage(); e.preventDefault(); }
        if (!isZoomed && e.key === 'ArrowRight') { nextImage(); e.preventDefault(); }
      });

        if (Math.abs(newScale - currentScale) < 0.01) return;
